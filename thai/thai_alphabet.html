<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมฝึกอ่านพยัญชนะไทย ก-ฮ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #FFE5B4 0%, #FFB6C1 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #FF6B6B;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .mode-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 15px 40px;
            font-size: 1.3rem;
            font-family: 'Sarabun', sans-serif;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .mode-btn.learn {
            background: linear-gradient(135deg, #74EBD5 0%, #ACB6E5 100%);
            color: white;
        }

        .mode-btn.quiz {
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%);
            color: white;
        }

        .mode-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .mode-btn.active {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .score-display {
            text-align: center;
            font-size: 1.5rem;
            color: #4A4A4A;
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: none;
        }

        .score-display.show {
            display: block;
        }

        .quiz-instruction {
            text-align: center;
            font-size: 1.8rem;
            color: #FF6B6B;
            margin-bottom: 20px;
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: none;
            animation: pulse 2s infinite;
        }

        .quiz-instruction.show {
            display: block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .letter-card {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            user-select: none;
        }

        .letter-card:hover {
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .letter-card:active {
            transform: scale(0.95);
        }

        .letter-card.correct {
            animation: correctPulse 0.5s ease;
            background: linear-gradient(135deg, #90EE90 0%, #32CD32 100%) !important;
        }

        .letter-card.wrong {
            animation: shake 0.5s ease;
            background: linear-gradient(135deg, #FFB6C1 0%, #FF6B6B 100%) !important;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Pastel colors for cards */
        .letter-card:nth-child(1) { background: linear-gradient(135deg, #FFB6C1 0%, #FFC0CB 100%); }
        .letter-card:nth-child(2) { background: linear-gradient(135deg, #87CEEB 0%, #ADD8E6 100%); }
        .letter-card:nth-child(3) { background: linear-gradient(135deg, #98FB98 0%, #90EE90 100%); }
        .letter-card:nth-child(4) { background: linear-gradient(135deg, #DDA0DD 0%, #EE82EE 100%); }
        .letter-card:nth-child(5) { background: linear-gradient(135deg, #F0E68C 0%, #FFD700 100%); }
        .letter-card:nth-child(6) { background: linear-gradient(135deg, #FFA07A 0%, #FF7F50 100%); }
        .letter-card:nth-child(7) { background: linear-gradient(135deg, #20B2AA 0%, #48D1CC 100%); }
        .letter-card:nth-child(8) { background: linear-gradient(135deg, #FF69B4 0%, #FF1493 100%); }
        .letter-card:nth-child(9) { background: linear-gradient(135deg, #00CED1 0%, #40E0D0 100%); }
        .letter-card:nth-child(10) { background: linear-gradient(135deg, #FFDAB9 0%, #FFE4B5 100%); }
        .letter-card:nth-child(11) { background: linear-gradient(135deg, #9370DB 0%, #8A2BE2 100%); }
        .letter-card:nth-child(12) { background: linear-gradient(135deg, #3CB371 0%, #2E8B57 100%); }
        .letter-card:nth-child(13) { background: linear-gradient(135deg, #FF6347 0%, #FF4500 100%); }
        .letter-card:nth-child(14) { background: linear-gradient(135deg, #BA55D3 0%, #9400D3 100%); }
        .letter-card:nth-child(15) { background: linear-gradient(135deg, #F4A460 0%, #D2691E 100%); }
        .letter-card:nth-child(16) { background: linear-gradient(135deg, #87CEFA 0%, #00BFFF 100%); }
        .letter-card:nth-child(17) { background: linear-gradient(135deg, #FFB6C1 0%, #FF69B4 100%); }
        .letter-card:nth-child(18) { background: linear-gradient(135deg, #7FFFD4 0%, #00FF7F 100%); }
        .letter-card:nth-child(19) { background: linear-gradient(135deg, #FFA500 0%, #FF8C00 100%); }
        .letter-card:nth-child(20) { background: linear-gradient(135deg, #DA70D6 0%, #FF00FF 100%); }
        .letter-card:nth-child(21) { background: linear-gradient(135deg, #6B8E23 0%, #556B2F 100%); }
        .letter-card:nth-child(22) { background: linear-gradient(135deg, #FF7F50 0%, #FF6347 100%); }
        .letter-card:nth-child(23) { background: linear-gradient(135deg, #4169E1 0%, #0000FF 100%); }
        .letter-card:nth-child(24) { background: linear-gradient(135deg, #BC8F8F 0%, #A52A2A 100%); }
        .letter-card:nth-child(25) { background: linear-gradient(135deg, #8FBC8F 0%, #228B22 100%); }
        .letter-card:nth-child(26) { background: linear-gradient(135deg, #FF1493 0%, #C71585 100%); }
        .letter-card:nth-child(27) { background: linear-gradient(135deg, #00FA9A 0%, #00FF00 100%); }
        .letter-card:nth-child(28) { background: linear-gradient(135deg, #DC143C 0%, #B22222 100%); }
        .letter-card:nth-child(29) { background: linear-gradient(135deg, #00FFFF 0%, #00CED1 100%); }
        .letter-card:nth-child(30) { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); }
        .letter-card:nth-child(31) { background: linear-gradient(135deg, #9932CC 0%, #8B008B 100%); }
        .letter-card:nth-child(32) { background: linear-gradient(135deg, #66CDAA 0%, #5F9EA0 100%); }
        .letter-card:nth-child(33) { background: linear-gradient(135deg, #FF4500 0%, #FF0000 100%); }
        .letter-card:nth-child(34) { background: linear-gradient(135deg, #E6E6FA 0%, #D8BFD8 100%); }
        .letter-card:nth-child(35) { background: linear-gradient(135deg, #F08080 0%, #CD5C5C 100%); }
        .letter-card:nth-child(36) { background: linear-gradient(135deg, #ADFF2F 0%, #9ACD32 100%); }
        .letter-card:nth-child(37) { background: linear-gradient(135deg, #FF69B4 0%, #DB7093 100%); }
        .letter-card:nth-child(38) { background: linear-gradient(135deg, #5F9EA0 0%, #4682B4 100%); }
        .letter-card:nth-child(39) { background: linear-gradient(135deg, #FF8C00 0%, #FF7F50 100%); }
        .letter-card:nth-child(40) { background: linear-gradient(135deg, #9370DB 0%, #8A2BE2 100%); }
        .letter-card:nth-child(41) { background: linear-gradient(135deg, #3CB371 0%, #2E8B57 100%); }
        .letter-card:nth-child(42) { background: linear-gradient(135deg, #FF6B6B 0%, #EE5A5A 100%); }
        .letter-card:nth-child(43) { background: linear-gradient(135deg, #20B2AA 0%, #008B8B 100%); }
        .letter-card:nth-child(44) { background: linear-gradient(135deg, #DA70D6 0%, #BA55D3 100%); }

        /* Responsive design */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .alphabet-grid {
                grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
                gap: 10px;
            }

            .letter-card {
                font-size: 1.8rem;
                border-radius: 15px;
            }

            .mode-btn {
                padding: 12px 25px;
                font-size: 1rem;
            }

            .quiz-instruction {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 480px) {
            .alphabet-grid {
                grid-template-columns: repeat(4, 1fr);
            }

            .letter-card {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 เกมฝึกอ่านพยัญชนะไทย ก-ฮ 🎮</h1>
            <div class="mode-buttons">
                <button class="mode-btn learn active" onclick="setMode('learn')">📚 ฝึกอ่าน</button>
                <button class="mode-btn quiz" onclick="setMode('quiz')">🎯 เล่นเกม</button>
            </div>
            <div class="score-display" id="scoreDisplay">
                คะแนน: <span id="score">0</span> | ตอบถูก: <span id="correct">0</span> | ตอบผิด: <span id="wrong">0</span>
            </div>
            <div class="quiz-instruction" id="quizInstruction">
                🔊 ฟังเสียงแล้วเลือกตัวอักษรที่ถูกต้อง!
            </div>
        </header>

        <div class="alphabet-grid" id="alphabetGrid"></div>
    </div>

    <script>
        // Thai consonants array (ก-ฮ)
        const thaiConsonants = [
            'ก', 'ข', 'ฃ', 'ค', 'ฅ', 'ฆ', 'ง',
            'จ', 'ฉ', 'ช', 'ซ', 'ฌ', 'ญ',
            'ฎ', 'ฏ', 'ฐ', 'ฑ', 'ฒ', 'ณ',
            'ด', 'ต', 'ถ', 'ท', 'ธ', 'น',
            'บ', 'ป', 'ผ', 'ฝ', 'พ', 'ฟ', 'ภ', 'ม',
            'ย', 'ร', 'ล', 'ว',
            'ศ', 'ษ', 'ส', 'ห', 'ฬ', 'ฮ'
        ];

        // Thai consonant names mapping (traditional names)
        const thaiConsonantNames = {
            'ก': 'กอ ไก่',
            'ข': 'ขอ ไข่',
            'ฃ': 'ขอ ขวด',
            'ค': 'คอ ควาย',
            'ฅ': 'คอ คน',
            'ฆ': 'คอ ระฆัง',
            'ง': 'งอ งู',
            'จ': 'จอ จาน',
            'ฉ': 'ฉอ ฉิ่ง',
            'ช': 'ชอ ช้าง',
            'ซ': 'ซอ โซ่',
            'ฌ': 'ชอ กะเชอ',
            'ญ': 'ยอ หญิง',
            'ฎ': 'ดอ ชะดา',
            'ฏ': 'ตอ ปะตัก',
            'ฐ': 'ถอ ถาน',
            'ฑ': 'ทอ นางมนโท',
            'ฒ': 'ทอ ผู้เฒ่า',
            'ณ': 'นอ เณร',
            'ด': 'ดอ เด็ก',
            'ต': 'ตอ เต่า',
            'ถ': 'ถอ ถุง',
            'ท': 'ทอ ทหาร',
            'ธ': 'ทอ ธง',
            'น': 'นอ หนู',
            'บ': 'บอ ใบไม้',
            'ป': 'ปอ ปลา',
            'ผ': 'ผอ ผึ้ง',
            'ฝ': 'ฝอ ฝา',
            'พ': 'พอ พาน',
            'ฟ': 'ฟอ ฟัน',
            'ภ': 'พอ สำเภา',
            'ม': 'มอ ม้า',
            'ย': 'ยอ ยักษ์',
            'ร': 'รอ เรือ',
            'ล': 'ลอ ลิง',
            'ว': 'วอ แหวน',
            'ศ': 'ศอ ศาลา',
            'ษ': 'สอ รือษี',
            'ส': 'สอ เสือ',
            'ห': 'หอ หีบ',
            'ฬ': 'รอ จุฬา',
            'ฮ': 'ฮอ นกฮูก'
        };

        let currentMode = 'learn';
        let score = 0;
        let correctAnswers = 0;
        let wrongAnswers = 0;
        let currentQuizLetter = null;
        let isProcessing = false;

        // Initialize the alphabet grid
        function initGrid() {
            const grid = document.getElementById('alphabetGrid');
            grid.innerHTML = '';
            
            thaiConsonants.forEach((letter, index) => {
                const card = document.createElement('div');
                card.className = 'letter-card';
                card.textContent = letter;
                card.dataset.letter = letter;
                card.onclick = () => handleCardClick(letter, card);
                grid.appendChild(card);
            });
        }

        // Handle card click based on current mode
        function handleCardClick(letter, card) {
            if (isProcessing && currentMode === 'quiz') return;

            if (currentMode === 'learn') {
                speakLetter(letter);
                animateCard(card);
            } else if (currentMode === 'quiz') {
                checkAnswer(letter, card);
            }
        }

        // Speak the letter using Web Speech API
        function speakLetter(letter) {
            if ('speechSynthesis' in window) {
                // Cancel any ongoing speech
                window.speechSynthesis.cancel();
                
                // Use the full traditional name of the consonant
                const letterName = thaiConsonantNames[letter] || letter;
                const utterance = new SpeechSynthesisUtterance(letterName);
                utterance.lang = 'th-TH';
                utterance.rate = 0.8;
                utterance.pitch = 1.2;
                utterance.volume = 1;
                
                window.speechSynthesis.speak(utterance);
            } else {
                alert('เบราว์เซอร์ของคุณไม่รองรับ Web Speech API');
            }
        }

        // Animate card on click
        function animateCard(card) {
            card.style.transform = 'scale(1.2)';
            setTimeout(() => {
                card.style.transform = '';
            }, 200);
        }

        // Set game mode
        function setMode(mode) {
            currentMode = mode;
            isProcessing = false;
            
            // Update button states
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.mode-btn.${mode}`).classList.add('active');
            
            // Show/hide score display
            const scoreDisplay = document.getElementById('scoreDisplay');
            const quizInstruction = document.getElementById('quizInstruction');
            
            if (mode === 'quiz') {
                scoreDisplay.classList.add('show');
                quizInstruction.classList.add('show');
                resetScore();
                startNewQuiz();
            } else {
                scoreDisplay.classList.remove('show');
                quizInstruction.classList.remove('show');
                // Remove any correct/wrong classes
                document.querySelectorAll('.letter-card').forEach(card => {
                    card.classList.remove('correct', 'wrong');
                });
            }
        }

        // Reset score
        function resetScore() {
            score = 0;
            correctAnswers = 0;
            wrongAnswers = 0;
            updateScoreDisplay();
        }

        // Update score display
        function updateScoreDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('correct').textContent = correctAnswers;
            document.getElementById('wrong').textContent = wrongAnswers;
        }

        // Start a new quiz
        function startNewQuiz() {
            // Remove any correct/wrong classes from previous round
            document.querySelectorAll('.letter-card').forEach(card => {
                card.classList.remove('correct', 'wrong');
            });
            
            // Randomly select a letter
            const randomIndex = Math.floor(Math.random() * thaiConsonants.length);
            currentQuizLetter = thaiConsonants[randomIndex];
            
            // Speak the letter after a short delay
            setTimeout(() => {
                speakLetter(currentQuizLetter);
                isProcessing = false;
            }, 500);
            
            isProcessing = true;
        }

        // Check answer in quiz mode
        function checkAnswer(selectedLetter, card) {
            if (!currentQuizLetter) return;
            
            isProcessing = true;
            
            // Remove any previous correct/wrong classes
            document.querySelectorAll('.letter-card').forEach(c => {
                c.classList.remove('correct', 'wrong');
            });
            
            if (selectedLetter === currentQuizLetter) {
                // Correct answer
                card.classList.add('correct');
                score += 10;
                correctAnswers++;
                playFeedbackSound('correct');
                
                setTimeout(() => {
                    updateScoreDisplay();
                    startNewQuiz();
                }, 1000);
            } else {
                // Wrong answer
                card.classList.add('wrong');
                score = Math.max(0, score - 5);
                wrongAnswers++;
                playFeedbackSound('wrong');
                
                // Highlight the correct answer
                const correctCard = document.querySelector(`.letter-card[data-letter="${currentQuizLetter}"]`);
                if (correctCard) {
                    correctCard.classList.add('correct');
                }
                
                setTimeout(() => {
                    updateScoreDisplay();
                    startNewQuiz();
                }, 1500);
            }
        }

        // Play feedback sound using Web Audio API
        function playFeedbackSound(type) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            if (type === 'correct') {
                oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
                oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); // E5
                oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2); // G5
            } else {
                oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                oscillator.frequency.setValueAtTime(150, audioContext.currentTime + 0.1);
            }
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        // Initialize on page load
        window.onload = function() {
            initGrid();
        };
    </script>
</body>
</html>
