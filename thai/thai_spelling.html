    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #E8F4F8 0%, #FFE4EC 50%, #FFF4CC 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #5A7D9A;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .menu-page {
            display: block;
        }

        .submenu-page {
            display: none;
        }

        .game-page {
            display: none;
        }

        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .pattern-btn {
            background: linear-gradient(145deg, #FFFFFF, #F0F0F0);
            border: 3px solid #B8D4E8;
            border-radius: 20px;
            padding: 25px 20px;
            font-size: 1.5rem;
            font-weight: 600;
            color: #5A7D9A;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1);
        }

        .pattern-btn:hover {
            transform: translateY(-5px) scale(1.05);
            background: linear-gradient(145deg, #FFE4EC, #FFD0E0);
            border-color: #FFB6C1;
            box-shadow: 6px 6px 15px rgba(0, 0, 0, 0.15);
        }

        .pattern-btn:active {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
        }

        .pattern-title {
            background: linear-gradient(145deg, #FFE4EC, #FFD0E0);
            border: 3px solid #FFB6C1;
            border-radius: 15px;
            padding: 15px 30px;
            font-size: 1.8rem;
            font-weight: 700;
            color: #D65A7A;
            margin-bottom: 40px;
            display: inline-block;
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.1);
        }

        .word-display {
            background: linear-gradient(145deg, #FFFFFF, #F8F8F8);
            border: 4px solid #B8D4E8;
            border-radius: 30px;
            padding: 60px 40px;
            margin: 30px 0;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.1);
        }

        .word-text {
            font-size: 4rem;
            font-weight: 700;
            color: #5A7D9A;
            transition: all 0.3s ease;
        }

        .word-text.bounce {
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 20px 40px;
            font-size: 1.4rem;
            font-weight: 600;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1);
            font-family: 'Sarabun', sans-serif;
        }

        .next-btn {
            background: linear-gradient(145deg, #98D8C8, #7BC4B0);
            color: #2D5A4A;
        }

        .next-btn:hover {
            transform: translateY(-3px) scale(1.05);
            background: linear-gradient(145deg, #7BC4B0, #5FA898);
            box-shadow: 6px 6px 15px rgba(0, 0, 0, 0.15);
        }

        .next-btn:active {
            transform: translateY(-1px) scale(1.02);
        }

        .back-btn {
            background: linear-gradient(145deg, #FFB6C1, #FF9AAB);
            color: #8B3A4A;
        }

        .back-btn:hover {
            transform: translateY(-3px) scale(1.05);
            background: linear-gradient(145deg, #FF9AAB, #FF7E8F);
            box-shadow: 6px 6px 15px rgba(0, 0, 0, 0.15);
        }

        .back-btn:active {
            transform: translateY(-1px) scale(1.02);
        }

        .decoration {
            font-size: 3rem;
            margin: 10px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .pattern-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 15px;
            }

            .pattern-btn {
                padding: 20px 15px;
                font-size: 1.2rem;
            }

            .pattern-title {
                font-size: 1.4rem;
                padding: 12px 20px;
            }

            .word-display {
                padding: 40px 20px;
                min-height: 150px;
            }

            .word-text {
                font-size: 2.5rem;
            }

            .action-btn {
                padding: 15px 30px;
                font-size: 1.2rem;
            }

            .button-group {
                flex-direction: column;
                align-items: center;
            }

            .action-btn {
                width: 100%;
                max-width: 250px;
            }
        }

        @media (max-width: 400px) {
            .pattern-grid {
                grid-template-columns: 1fr;
            }

            .word-text {
                font-size: 2rem;
            }
        }
    </style>
</head>

            <h2 style="color: #D65A7A; font-size: 1.5rem; margin-bottom: 20px;">เลือกมาตราตัวสะกดที่ต้องการฝึก</h2>
            <div class="pattern-grid">

                <button class="pattern-btn" onclick="startGame('แม่กง')">แม่กง</button>
            </div>
        </div>

        <!-- Sub-menu Page -->
        <div class="submenu-page" id="submenuPage">
            <h2 style="color: #D65A7A; font-size: 1.5rem; margin-bottom: 20px;">เลือกชุดคำศัพท์ <span id="submenuTitle"></span></h2>
            <div class="pattern-grid" id="submenuGrid"></div>
            <div class="button-group">
                <button class="action-btn back-btn" onclick="goBackToMenu()">⬅️ กลับหน้าหลัก</button>
            </div>
        </div>

        <!-- Game Page -->
        <div class="game-page" id="gamePage">
            <div class="pattern-title" id="patternTitle"></div>
            <div class="word-display">
                <span class="word-text" id="wordText"></span>
            </div>
            <div class="button-group">

                <button class="action-btn back-btn" onclick="speakWord()">🔊 ฟังเสียง</button>
            </div>
            <div class="button-group">
                <button class="action-btn back-btn" onclick="goBack()">⬅️ กลับหน้าหลัก</button>
            </div>
        </div>
    </div>

        function showSubMenu(pattern) {

            // Check if pattern has sub-sets (object) or is a single array
            if (Array.isArray(data)) {
                // Single array, start game directly
                startGame(pattern, null);
            } else {
                // Object with sub-sets, show sub-menu
                document.getElementById('submenuTitle').textContent = pattern;
                const submenuGrid = document.getElementById('submenuGrid');
                submenuGrid.innerHTML = '';
                
                for (const setName in data) {
                    const btn = document.createElement('button');
                    btn.className = 'pattern-btn';
                    btn.textContent = setName;
                    btn.onclick = () => startGame(pattern, setName);
                    submenuGrid.appendChild(btn);
                }
                
                document.getElementById('menuPage').style.display = 'none';
                document.getElementById('submenuPage').style.display = 'block';
            }
        }

        function startGame(pattern, setName) {
            currentPattern = pattern;
            currentSetName = setName;
            
            let words;
            if (setName) {
                words = [...wordDatabase[pattern][setName]];
                document.getElementById('patternTitle').textContent = `${pattern} - ${setName}`;
            } else {
                words = [...wordDatabase[pattern]];
                document.getElementById('patternTitle').textContent = pattern;
            }
            
            currentWords = words;
            currentWordIndex = 0;

            // Shuffle words
            shuffleArray(currentWords);

            // Update UI
            document.getElementById('wordText').textContent = currentWords[0];

            // Show game page, hide menu and submenu
            document.getElementById('menuPage').style.display = 'none';
            document.getElementById('submenuPage').style.display = 'none';
            document.getElementById('gamePage').style.display = 'block';

            // Add bounce animation
            animateWord();
        }

        function nextWord() {
            currentWordIndex++;

            if (currentWordIndex >= currentWords.length) {
                // Reshuffle and start over
                currentWordIndex = 0;
                shuffleArray(currentWords);
            }

            document.getElementById('wordText').textContent = currentWords[currentWordIndex];
            animateWord();
        }

        function prevWord() {
            currentWordIndex--;

            if (currentWordIndex < 0) {
                // Go to last word
                currentWordIndex = currentWords.length - 1;
            }

            document.getElementById('wordText').textContent = currentWords[currentWordIndex];
            animateWord();
        }

        function speakWord() {
            const word = document.getElementById('wordText').textContent;
            
            if ('speechSynthesis' in window) {
                // Cancel any ongoing speech
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'th-TH';
                utterance.rate = 0.8; // Slightly slower for better clarity
                utterance.pitch = 1;
                
                window.speechSynthesis.speak(utterance);
            } else {
                alert('เบราว์เซอร์ของคุณไม่รองรับการอ่านเสียง');
            }
        }

        function goBack() {
            document.getElementById('gamePage').style.display = 'none';
            
            // If we came from a sub-menu, go back to sub-menu
            if (currentSetName) {
                document.getElementById('submenuPage').style.display = 'block';
            } else {
                document.getElementById('menuPage').style.display = 'block';
            }
        }

        function goBackToMenu() {
            document.getElementById('submenuPage').style.display = 'none';
            document.getElementById('menuPage').style.display = 'block';
        }

        function animateWord() {
            const wordText = document.getElementById('wordText');
            wordText.classList.remove('bounce');

            // Trigger reflow to restart animation
            void wordText.offsetWidth;

            wordText.classList.add('bounce');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
    </script>
</body>

</html>
