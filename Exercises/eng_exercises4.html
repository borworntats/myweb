<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Exercises: Yes/No Questions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --error: #ef4444;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            color: var(--text-main);
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.25rem;
            color: #0f172a;
            margin-bottom: 0.75rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.125rem;
        }

        .example-box {
            background: linear-gradient(to right, #eef2ff, #e0e7ff);
            border-left: 4px solid var(--primary);
            padding: 1.5rem;
            border-radius: 0 0.75rem 0.75rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            animation: fadeIn 1s ease-out;
        }

        .example-text {
            font-size: 1.1rem;
        }

        .exercise-card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.5s ease-out backwards;
        }

        .exercise-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .question-header {
            display: flex;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .question-number {
            background: var(--primary);
            color: white;
            width: 2.5rem;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 600;
            margin-right: 1rem;
            flex-shrink: 0;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
        }

        .question-text {
            font-size: 1.125rem;
            font-weight: 500;
            color: #334155;
        }

        .options-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .option-btn {
            flex: 1;
            padding: 0.875rem;
            font-size: 1.125rem;
            border: 2px solid var(--border-color);
            border-radius: 0.75rem;
            background: #f8fafc;
            color: var(--text-main);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .option-btn:hover {
            border-color: #cbd5e1;
            background: #f1f5f9;
        }

        .option-btn.selected {
            border-color: var(--primary);
            background: #eef2ff;
            color: var(--primary-hover);
            box-shadow: inset 0 0 0 1px var(--primary);
        }

        .correct .option-btn.selected {
            border-color: var(--success);
            background: #ecfdf5;
            color: #065f46;
            box-shadow: inset 0 0 0 1px var(--success);
        }

        .incorrect .option-btn.selected {
            border-color: var(--error);
            background: #fef2f2;
            color: #991b1b;
            box-shadow: inset 0 0 0 1px var(--error);
        }

        .result-text {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--primary);
            min-height: 1.75rem;
            text-align: center;
            margin-bottom: 0.5rem;
            transition: color 0.3s ease;
        }

        .correct .result-text {
            color: var(--success);
        }

        .incorrect .result-text {
            color: var(--error);
        }

        .feedback {
            font-size: 0.9rem;
            font-weight: 500;
            height: 1.25rem;
            transition: opacity 0.3s ease;
            opacity: 0;
            text-align: center;
        }

        .correct .feedback {
            color: var(--success);
            opacity: 1;
        }

        .incorrect .feedback {
            color: var(--error);
            opacity: 1;
        }

        .action-container {
            text-align: center;
            margin-top: 3rem;
            animation: fadeIn 1.2s ease-out;
            padding-bottom: 2rem;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, #818cf8 100%);
            color: white;
            border: none;
            padding: 1rem 3rem;
            font-size: 1.125rem;
            font-weight: 600;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.5);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .score-display {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 2rem;
            color: #0f172a;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .score-visible {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 1.75rem;
            }

            .exercise-card {
                padding: 1.25rem;
            }

            .question-text {
                font-size: 1rem;
            }

            .option-btn {
                font-size: 1rem;
                padding: 0.75rem;
            }

            .result-text {
                font-size: 1.05rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Change these sentences into Yes / No Questions</h1>
            <p class="subtitle">Exercise 1: Make Present Simple "Yes/No" with "Be"</p>
        </header>

        <div class="example-box">
            <div class="example-text">
                <strong>Example:</strong> They / be / students &rarr; <em>Are they students?</em>
            </div>
        </div>

        <div id="quiz-container">
            <!-- Questions will be injected here via JS -->
        </div>

        <div class="action-container">
            <button class="btn" onclick="checkAnswers()">Check Answers</button>
            <div id="score" class="score-display"></div>
        </div>
    </div>

    <script>
        const questions = [
            { id: 1, prompt: "John / be / in the garden?", answers: ["Is John in the garden?"] },
            { id: 2, prompt: "They / be / hungry?", answers: ["Are they hungry?"] },
            { id: 3, prompt: "We / be / late?", answers: ["Are we late?"] },
            { id: 4, prompt: "You / be / tired?", answers: ["Are you tired?"] },
            { id: 5, prompt: "Pipo / be / a teacher?", answers: ["Is Pipo a teacher?"] },
            { id: 7, prompt: "Harry and Lucy / be / from London?", answers: ["Are Harry and Lucy from London?"] },
            { id: 8, prompt: "I / be / on time?", answers: ["Am I on time?"] },
            { id: 9, prompt: "Jane and Lisa / be / at the meeting?", answers: ["Are Jane and Lisa at the meeting?"] },
            { id: 10, prompt: "You / be / in Paris?", answers: ["Are you in Paris?"] }
        ];

        const quizContainer = document.getElementById('quiz-container');
        const userAnswers = {};

        // Render questions
        questions.forEach((q, index) => {
            const delay = index * 0.08;
            const cardHtml = `
            <div class="exercise-card" id="card-${q.id}" style="animation-delay: ${delay}s">
                <div class="question-header">
                    <div class="question-number">${q.id}</div>
                    <div class="question-text">${q.prompt}</div>
                </div>
                <div class="options-group" id="options-${q.id}">
                    <button class="option-btn" onclick="selectOption(${q.id}, 'Am')">Am</button>
                    <button class="option-btn" onclick="selectOption(${q.id}, 'Is')">Is</button>
                    <button class="option-btn" onclick="selectOption(${q.id}, 'Are')">Are</button>
                </div>
                <div class="result-text" id="result-${q.id}"></div>
                <div class="feedback" id="feedback-${q.id}"></div>
            </div>
        `;
            quizContainer.insertAdjacentHTML('beforeend', cardHtml);
        });

        function selectOption(qId, verb) {
            userAnswers[qId] = verb;

            const cardEl = document.getElementById(`card-${qId}`);
            // Remove error/correct states when a user changes their answer
            cardEl.classList.remove('incorrect', 'correct');
            document.getElementById(`feedback-${qId}`).textContent = "";
            document.getElementById(`score`).classList.remove('score-visible');

            // Update UI for selected button
            const optionsGroup = document.getElementById(`options-${qId}`);
            const buttons = optionsGroup.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.classList.remove('selected');
                if (btn.textContent === verb) {
                    btn.classList.add('selected');
                }
            });

            // Generate full sentence based on choice
            const q = questions.find(question => question.id === qId);
            const words = q.prompt.split(' / ');
            let sentence = "";

            if (words.length >= 3) {
                let subject = words[0].trim();
                let rest = words[2].trim();

                const lowerSubject = subject.toLowerCase();
                const pronounsToLowerCase = ["they", "we", "you", "he", "she", "it"];
                if (pronounsToLowerCase.includes(lowerSubject)) {
                    subject = lowerSubject;
                }

                sentence = `${verb} ${subject} ${rest}`;
                document.getElementById(`result-${qId}`).textContent = sentence;
            }
        }

        function checkAnswers() {
            let score = 0;
            let allAnswered = true;

            // First pass to check if all answered
            questions.forEach(q => {
                if (!userAnswers[q.id]) {
                    allAnswered = false;
                }
            });

            questions.forEach(q => {
                const cardEl = document.getElementById(`card-${q.id}`);
                const feedbackEl = document.getElementById(`feedback-${q.id}`);

                const userAnswer = userAnswers[q.id];

                if (!userAnswer) {
                    cardEl.classList.remove('correct', 'incorrect');
                    feedbackEl.textContent = "Please select an answer.";
                    cardEl.classList.add('incorrect');
                    return;
                }

                const correctVerb = q.answers[0].split(' ')[0]; // Gets 'Is', 'Are', etc.

                if (userAnswer === correctVerb) {
                    cardEl.classList.remove('incorrect');
                    cardEl.classList.add('correct');
                    feedbackEl.textContent = "Excellent!";
                    score++;
                } else {
                    cardEl.classList.remove('correct');
                    cardEl.classList.add('incorrect');
                    feedbackEl.textContent = "Try again!";
                }
            });

            const scoreDisplay = document.getElementById('score');
            if (!allAnswered) {
                scoreDisplay.textContent = `Please complete all questions!`;
                scoreDisplay.style.color = "var(--error)";
                scoreDisplay.classList.add('score-visible');
                return;
            }

            scoreDisplay.textContent = `You scored ${score} out of ${questions.length}!`;
            scoreDisplay.classList.add('score-visible');

            if (score === questions.length) {
                scoreDisplay.style.color = "var(--success)";
                triggerConfetti();
            } else {
                scoreDisplay.style.color = "";
            }
        }

        function triggerConfetti() {
            for (let i = 0; i < 70; i++) {
                createConfettiParticle();
            }
        }

        function createConfettiParticle() {
            const colors = ['#6366f1', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', '#3b82f6'];
            const confetti = document.createElement('div');
            confetti.style.position = 'fixed';
            confetti.style.width = Math.random() * 8 + 6 + 'px';
            confetti.style.height = Math.random() * 12 + 8 + 'px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.top = '-20px';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            confetti.style.zIndex = '9999';
            confetti.style.pointerEvents = 'none';
            document.body.appendChild(confetti);

            const duration = Math.random() * 3 + 2;
            const animation = confetti.animate([
                { transform: 'translate3d(0,0,0) rotate(0deg)', opacity: 1 },
                { transform: `translate3d(${Math.random() * 300 - 150}px, 100vh, 0) rotate(${Math.random() * 1000}deg)`, opacity: 0 }
            ], {
                duration: duration * 1000,
                easing: 'cubic-bezier(.37,0,.63,1)'
            });

            animation.onfinish = () => confetti.remove();
        }
    </script>

</body>

</html>
