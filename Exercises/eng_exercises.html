<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Grammar Hub</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+Thai:wght@300;400;500;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366F1;
            --secondary: #10B981;
            --bg-gradient-start: #0F172A;
            --bg-gradient-end: #1E293B;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1F2937;
        }

        body {
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            font-family: 'Outfit', 'Noto Sans Thai', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 4rem;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #3B82F6, #8B5CF6, #EC4899);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            color: #111827;
            margin: 0 0 1rem 0;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #F43F5E, #8B5CF6, #3B82F6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.25rem;
            color: #6B7280;
            font-weight: 500;
            margin-bottom: 3.5rem;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .card {
            background: #ffffff;
            border: 2px solid #E5E7EB;
            border-radius: 20px;
            padding: 3rem 2rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(139, 92, 246, 0.08));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover {
            transform: translateY(-12px);
            border-color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.2), 0 10px 10px -5px rgba(99, 102, 241, 0.1);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0 0 0.8rem 0;
            color: #1F2937;
        }

        .card-desc {
            font-size: 1.15rem;
            color: #4B5563;
            margin: 0;
            line-height: 1.6;
        }

        .badge {
            background: #EEF2FF;
            color: var(--primary);
            padding: 0.4rem 1.2rem;
            border-radius: 9999px;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 2rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        /* Styling for the second card manually */
        .card-2 {
            border-color: #E5E7EB;
        }

        .card-2:hover {
            border-color: var(--secondary);
            box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.2), 0 10px 10px -5px rgba(16, 185, 129, 0.1);
        }

        .card-2::before {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.08), rgba(5, 150, 105, 0.08));
        }

        .card-2 .badge {
            background: #ECFDF5;
            color: var(--secondary);
            border-color: rgba(16, 185, 129, 0.2);
        }

        @media (max-width: 768px) {
            .container {
                padding: 3rem 2rem;
            }

            .card-grid {
                gap: 2rem;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 2.5rem 1.5rem;
            }

            h1 {
                font-size: 2.2rem;
            }

            .subtitle {
                font-size: 1.05rem;
                margin-bottom: 2.5rem;
            }

            .card-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .card {
                padding: 2.5rem 1.5rem;
            }

            .card-icon {
                font-size: 3rem;
            }

            .card-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>English Grammar Hub</h1>
        <div class="subtitle">เลือกแบบฝึกหัดภาษาอังกฤษที่คุณต้องการทำด้านล่างนี้</div>

        <div class="card-grid">
            <a href="eng_exercises1.html" class="card">
                <div class="card-icon">🎯</div>
                <h2 class="card-title">Exercise 1</h2>
                <div class="card-desc">แบบฝึกหัดเรื่องการเปรียบเทียบและการเติมคำในช่องว่าง</div>
                <div class="badge">12 ข้อ</div>
            </a>

            <a href="eng_exercises2.html" class="card card-2">
                <div class="card-icon">🚀</div>
                <h2 class="card-title">Exercise 2</h2>
                <div class="card-desc">แบบฝึกหัดชุดใหญ่ ฝึกการใช้ Comparative & Superlative</div>
                <div class="badge">40 ข้อ</div>
            </a>
        </div>
    </div>

</body>

</html>
