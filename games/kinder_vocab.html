<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมคำศัพท์ อนุบาล 3</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Mali', cursive, sans-serif;
            background-color: #e0f7fa;
            text-align: center;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }

        h1 {
            color: #ff5722;
            font-size: 2.2rem;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0, 0, 0, 0.1);
            margin-top: 5px;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .game-container {
            background-color: white;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border: 4px solid #ffeb3b;
        }

        .question-box {
            background-color: #fff9c4;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 3px dashed #ffc107;
        }

        .question {
            font-size: 3.5rem;
            color: #1976d2;
            margin: 0;
            line-height: 1;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 15px 10px;
            font-size: 1.8rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: inherit;
            box-shadow: 0 6px 0 #388e3c;
            text-transform: capitalize;
        }

        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #388e3c;
            background-color: #66bb6a;
        }

        .option-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #388e3c;
        }

        .option-btn:disabled {
            background-color: #9e9e9e;
            box-shadow: 0 6px 0 #757575;
            cursor: not-allowed;
            transform: none;
        }

        .score-board {
            font-size: 1.4rem;
            color: #d81b60;
            background: #fce4ec;
            padding: 8px 20px;
            border-radius: 25px;
            display: inline-block;
            margin-bottom: 15px;
            border: 3px solid #f06292;
            font-weight: bold;
        }

        .feedback {
            font-size: 1.8rem;
            font-weight: bold;
            height: 40px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: popIn 0.5s forwards;
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            80% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .correct {
            color: #4caf50;
        }

        .wrong {
            color: #f44336;
        }

        #next-btn {
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.5rem;
            border-radius: 15px;
            cursor: pointer;
            display: none;
            margin: 15px auto 0;
            font-family: inherit;
            box-shadow: 0 6px 0 #f57c00;
            transition: all 0.2s;
            font-weight: bold;
        }

        #next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #f57c00;
            background-color: #ffb74d;
        }

        #next-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #f57c00;
        }

        /* Interactive animations for results */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-10px);
            }

            40%,
            80% {
                transform: translateX(10px);
            }
        }

        .shake-animation {
            animation: shake 0.5s;
        }

        @keyframes tada {
            0% {
                transform: scale(1);
            }

            10%,
            20% {
                transform: scale(0.9) rotate(-3deg);
            }

            30%,
            50%,
            70%,
            90% {
                transform: scale(1.1) rotate(3deg);
            }

            40%,
            60%,
            80% {
                transform: scale(1.1) rotate(-3deg);
            }

            100% {
                transform: scale(1);
            }
        }

        .tada-animation {
            animation: tada 1s;
        }

        /* Responsive */
        @media (max-height: 800px),
        (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
                margin-bottom: 10px;
                margin-top: 5px;
            }

            .question {
                font-size: 2.8rem;
            }

            .option-btn {
                font-size: 1.5rem;
                padding: 12px 10px;
            }

            .game-container {
                padding: 15px;
                border-width: 3px;
            }

            .question-box {
                padding: 15px;
                margin-bottom: 15px;
            }

            .score-board {
                font-size: 1.2rem;
                margin-bottom: 10px;
            }

            #next-btn {
                padding: 12px 25px;
                font-size: 1.3rem;
                margin-top: 10px;
            }

            .feedback {
                height: 35px;
                font-size: 1.5rem;
                margin: 10px 0;
            }
        }

        @media (max-width: 400px) {
            .question {
                font-size: 2.2rem;
            }

            .option-btn {
                font-size: 1.2rem;
                padding: 10px;
                border-radius: 12px;
            }

            .options {
                gap: 10px;
            }
        }
    </style>
</head>

<body>

    <h1>🌟 เกมคำศัพท์ อ.3 🌟</h1>

    <div class="score-board">⭐ คะแนน: <span id="score">0</span> ⭐</div>

    <div class="game-container">
        <div class="question-box">
            <div class="question" id="question">แมว</div>
        </div>

        <div class="options" id="options">
            <!-- Buttons dynamically generated -->
        </div>

        <div class="feedback" id="feedback"></div>

        <button id="next-btn" onclick="nextQuestion()">ข้อต่อไป ➡️</button>
    </div>

    <script>
        const vocabulary = [
            { thai: "แมว 🐱", english: "Cat", options: ["Dog", "Cat", "Bird", "Fish"] },
            { thai: "หมา 🐶", english: "Dog", options: ["Pig", "Cow", "Dog", "Rat"] },
            { thai: "นก 🐦", english: "Bird", options: ["Bird", "Ant", "Bat", "Cat"] },
            { thai: "ปลา 🐟", english: "Fish", options: ["Frog", "Fish", "Crab", "Duck"] },
            { thai: "หมู 🐷", english: "Pig", options: ["Cow", "Horse", "Pig", "Sheep"] },
            { thai: "สีแดง 🔴", english: "Red", options: ["Blue", "Green", "Red", "Yellow"] },
            { thai: "สีเหลือง 🟡", english: "Yellow", options: ["Pink", "Yellow", "Black", "White"] },
            { thai: "แอปเปิ้ล 🍎", english: "Apple", options: ["Banana", "Orange", "Apple", "Mango"] },
            { thai: "พระอาทิตย์ ☀️", english: "Sun", options: ["Moon", "Star", "Sky", "Sun"] },
            { thai: "รถยนต์ 🚗", english: "Car", options: ["Bus", "Train", "Car", "Boat"] }
        ];

        let currentQuestion = 0;
        let score = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function loadQuestion() {
            if (currentQuestion === 0) {
                shuffleArray(vocabulary);
            }

            const q = vocabulary[currentQuestion];
            const qBox = document.querySelector('.question-box');
            qBox.classList.remove('tada-animation', 'shake-animation');

            document.getElementById("question").textContent = q.thai;

            let currentOptions = [...q.options];
            shuffleArray(currentOptions);

            const optionsContainer = document.getElementById("options");
            optionsContainer.innerHTML = '';

            currentOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });

            document.getElementById("feedback").textContent = '';
            document.getElementById("next-btn").style.display = 'none';
        }

        function playSound(type) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (!audioCtx) return;

                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                if (type === 'correct') {
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                    oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
                    oscillator.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.5);
                } else {
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.3);
                }
            } catch (e) {
                console.log("Audio not supported");
            }
        }

        function checkAnswer(selected, selectedBtn) {
            const correctAnswer = vocabulary[currentQuestion].english;
            const feedbackEl = document.getElementById("feedback");
            const qBox = document.querySelector('.question-box');
            const btns = document.querySelectorAll('.option-btn');

            // Disable buttons after guess
            btns.forEach(b => {
                b.disabled = true;
                if (b.textContent === correctAnswer) {
                    b.style.backgroundColor = '#4caf50'; // Highlight correct
                    b.style.boxShadow = '0 8px 0 #388e3c';
                } else {
                    b.style.backgroundColor = '#e0e0e0';
                    b.style.color = '#757575';
                    b.style.boxShadow = '0 8px 0 #9e9e9e';
                }
            });

            // Force reflow for animation
            feedbackEl.style.animation = 'none';
            feedbackEl.offsetHeight;
            feedbackEl.style.animation = 'popIn 0.5s forwards';

            if (selected === correctAnswer) {
                feedbackEl.textContent = "เย้! ถูกต้องครับ 🎉";
                feedbackEl.className = "feedback correct";
                qBox.classList.add('tada-animation');
                score++;
                document.getElementById("score").textContent = score;
                playSound('correct');
                createConfetti();
            } else {
                feedbackEl.textContent = `ผิดครับ 😅 (ตอบ: ${correctAnswer})`;
                feedbackEl.className = "feedback wrong";
                qBox.classList.add('shake-animation');
                // Highlight the wrong selected button red
                selectedBtn.style.backgroundColor = '#f44336';
                selectedBtn.style.color = 'white';
                selectedBtn.style.boxShadow = '0 8px 0 #d32f2f';
                playSound('wrong');
            }

            document.getElementById("next-btn").style.display = 'block';
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < vocabulary.length) {
                loadQuestion();
            } else {
                document.getElementById("question").textContent = "จบเกมแล้ว! 🎈";
                document.querySelector('.question-box').classList.add('tada-animation');
                document.getElementById("options").innerHTML = `<div style="grid-column: span 2; font-size: 3rem; color: #ff9800;">คุณได้คะแนน ${score} / ${vocabulary.length}</div>`;
                document.getElementById("feedback").textContent = "ยอดเยี่ยมมาก! 🏆";
                document.getElementById("next-btn").textContent = "เล่นใหม่ 🔄";

                if (score > vocabulary.length * 0.7) {
                    for (let i = 0; i < 3; i++) setTimeout(createConfetti, i * 500);
                }

                document.getElementById("next-btn").onclick = () => {
                    score = 0;
                    currentQuestion = 0;
                    document.getElementById("score").textContent = score;
                    document.getElementById("next-btn").textContent = "ข้อต่อไป ➡️";
                    document.getElementById("next-btn").onclick = nextQuestion;
                    loadQuestion();
                };
            }
        }

        // Simple confetti effect
        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4CAF50', '#8BC34A', '#CDDC39', '#FFEB3B', '#FFC107', '#FF9800', '#FF5722'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];

                confetti.style.position = 'fixed';
                confetti.style.width = '10px';
                confetti.style.height = '10px';
                confetti.style.backgroundColor = randomColor;
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.zIndex = '1000';
                confetti.style.pointerEvents = 'none';

                document.body.appendChild(confetti);

                const duration = Math.random() * 3 + 2;
                confetti.animate([
                    { transform: `translate3d(0,0,0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate3d(${Math.random() * 200 - 100}px, 100vh, 0) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    easing: 'cubic-bezier(.37,0,.63,1)',
                    fill: 'forwards'
                });

                setTimeout(() => confetti.remove(), duration * 1000);
            }
        }

        // Initialize game
        loadQuestion();
    </script>
</body>

</html>
